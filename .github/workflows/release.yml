name: Build & Release

# On every push to master: auto-increment the version, commit it back to master
# (so package.json is the canonical, build-system-owned version), then build the
# Windows installers and publish them to the repo's Releases page as v<version>.
#
# Loop safety (two layers): the bump commit message carries "[skip ci]", AND
# pushes made with the built-in GITHUB_TOKEN don't trigger workflow runs — so the
# auto-commit can never re-trigger this job.
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        type: choice
        default: patch
        options: [patch, minor, major]

# Required to push the version-bump commit and to create/update GitHub Releases.
permissions:
  contents: write

# Serialize releases; do NOT cancel a run mid-bump/publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0 # full history + tags so version/tagging is clean

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-increment version & commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump || 'patch' }} -m "ci: release v%s [skip ci]"
          git push --follow-tags origin master

      - name: Build & publish to GitHub Releases
        run: npm run dist -- --publish always
        env:
          # Auto-provided by Actions; electron-builder uses it to publish.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
