<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>Diagnostic Logs - Certiorari</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0d0e12;
        color: #d1d1d1;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 10px 15px;
        background: #1e1f23;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: #eee;
      }
      .actions {
        display: flex;
        gap: 10px;
      }
      button {
        background: #333;
        color: #eee;
        border: 1px solid #444;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
      }
      button:hover {
        background: #444;
      }
      #log-container {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        font-family: 'Consolas', 'Monaco', monospace;
        white-space: pre-wrap;
      }
      .log-entry {
        margin-bottom: 8px;
        border-left: 3px solid #555;
        padding-left: 10px;
      }
      .log-time {
        color: #888;
        font-size: 11px;
        margin-bottom: 2px;
      }
      .log-msg {
        word-break: break-all;
      }
      .log-diag { border-color: #4a90e2; }
      .log-nuke { border-color: #e24a4a; }
      .log-info { border-color: #4ae28d; }
      
      pre { margin: 0; }
      .diag-json {
        background: #16171d;
        padding: 5px;
        border-radius: 3px;
        margin-top: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Diagnostic Logs</h2>
      <div class="actions">
        <button id="clear-btn">Clear</button>
      </div>
    </header>
    <div id="log-container"></div>
    <script src="logs.js"></script>
  </body>
</html>
